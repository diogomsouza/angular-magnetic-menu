<div
  class="stagyra-magnetic-menu"
  [ngClass]="shellClass"
  [ngStyle]="hostStyles"
  (click)="onShellClick()"
  (keydown.escape)="closeFooterMenu()"
>
  <aside
    class="stagyra-magnetic-menu__panel"
    [attr.aria-hidden]="bodyAriaHidden"
  >
    <button
      #handle
      type="button"
      class="stagyra-magnetic-menu__handle"
      [attr.aria-label]="handleAriaLabel"
      [attr.aria-expanded]="opened"
      [attr.aria-controls]="'stagyra-magnetic-menu-body'"
      (click)="onHandleClick()"
      (keydown)="onHandleKeydown($event)"
      (pointerdown)="onHandlePointerDown($event)"
    >
      <span class="stagyra-magnetic-menu__handle-track"></span>
      <span class="stagyra-magnetic-menu__handle-arrows" aria-hidden="true"></span>
    </button>

    <div
      #body
      id="stagyra-magnetic-menu-body"
      class="stagyra-magnetic-menu__body"
      (scroll)="onMenuBodyScroll()"
    >
      <div class="stagyra-magnetic-menu__header">
        <ng-content select="[magnetic-menu-header], [stagyra-magnetic-menu-header]"></ng-content>
      </div>

      <nav class="stagyra-magnetic-menu__nav" aria-label="Magnetic menu">
        <section
          *ngFor="let section of visibleSections(); trackBy: trackSection"
          class="stagyra-magnetic-menu__section"
        >
          <h2
            *ngIf="section.title"
            class="stagyra-magnetic-menu__section-title"
          >
            {{ section.title }}
          </h2>

          <button
            *ngFor="let item of section.items; trackBy: trackItem"
            type="button"
            class="stagyra-magnetic-menu__item"
            [class.stagyra-magnetic-menu__item--active]="isItemActive(item)"
            [class.stagyra-magnetic-menu__item--disabled]="item.disabled"
            [attr.aria-current]="isItemActive(item) ? 'page' : null"
            [attr.aria-disabled]="item.disabled"
            [attr.aria-label]="item.ariaLabel || item.label"
            [attr.title]="item.tooltip || null"
            [attr.tabindex]="item.disabled ? -1 : itemTabIndex"
            (click)="onItemClick(item, section, $event)"
            (keydown)="onItemKeydown(item, section, $event)"
          >
            <span class="stagyra-magnetic-menu__item-icon" aria-hidden="true">
              <span *ngIf="item.iconClass" [class]="item.iconClass">
                {{ item.icon || '' }}
              </span>
              <span *ngIf="!item.iconClass && item.icon" class="material-symbols-rounded">
                {{ item.icon }}
              </span>
            </span>

            <span class="stagyra-magnetic-menu__item-label">{{ item.label }}</span>

            <span
              *ngIf="item.count !== undefined && item.count !== null"
              class="stagyra-magnetic-menu__item-count"
            >
              {{ item.count }}
            </span>
          </button>
        </section>
      </nav>

      <div class="stagyra-magnetic-menu__footer">
        <ng-content select="[magnetic-menu-footer], [stagyra-magnetic-menu-footer]"></ng-content>
      </div>
    </div>

    <span
      class="stagyra-magnetic-menu__body-scrollbar"
      [class.stagyra-magnetic-menu__body-scrollbar--visible]="bodyScrollable"
      aria-hidden="true"
    >
      <span class="stagyra-magnetic-menu__body-scrollbar-thumb"></span>
    </span>

    <div
      *ngIf="footerMenu as menu"
      class="stagyra-magnetic-menu__footer-menu"
      (click)="onFooterMenuClick($event)"
    >
      <div
        *ngIf="footerMenuOpen"
        class="stagyra-magnetic-menu__footer-popup"
        role="menu"
        [attr.aria-label]="menu.ariaLabel || menu.label"
      >
        <div
          *ngIf="menu.user"
          class="stagyra-magnetic-menu__footer-user"
        >
          <span class="stagyra-magnetic-menu__footer-avatar" aria-hidden="true">
            <img *ngIf="menu.user.avatarUrl" [src]="menu.user.avatarUrl" alt="">
            <span *ngIf="!menu.user.avatarUrl">{{ menu.user.avatarText || menu.user.label.charAt(0) }}</span>
          </span>
          <span class="stagyra-magnetic-menu__footer-user-text">
            <span class="stagyra-magnetic-menu__footer-user-label">{{ menu.user.label }}</span>
            <span *ngIf="menu.user.subtitle" class="stagyra-magnetic-menu__footer-user-subtitle">
              {{ menu.user.subtitle }}
            </span>
          </span>
        </div>

        <button
          *ngFor="let item of visibleFooterItems; trackBy: trackFooterAction"
          type="button"
          class="stagyra-magnetic-menu__footer-action"
          [class.stagyra-magnetic-menu__footer-action--separated]="item.separatorBefore"
          [class.stagyra-magnetic-menu__footer-action--disabled]="item.disabled"
          [attr.aria-disabled]="item.disabled"
          [attr.aria-label]="item.ariaLabel || item.label"
          [attr.tabindex]="item.disabled ? -1 : 0"
          role="menuitem"
          (click)="onFooterActionClick(item, $event)"
        >
          <span class="stagyra-magnetic-menu__footer-action-icon" aria-hidden="true">
            <span *ngIf="item.iconClass" [class]="item.iconClass">
              {{ item.icon || '' }}
            </span>
            <span *ngIf="!item.iconClass && item.icon" class="material-symbols-rounded">
              {{ item.icon }}
            </span>
          </span>
          <span class="stagyra-magnetic-menu__footer-action-label">{{ item.label }}</span>
          <span *ngIf="item.hint" class="stagyra-magnetic-menu__footer-action-hint">{{ item.hint }}</span>
        </button>
      </div>

      <button
        type="button"
        class="stagyra-magnetic-menu__footer-trigger"
        [attr.aria-label]="footerTriggerAriaLabel"
        [attr.aria-expanded]="footerMenuOpen"
        aria-haspopup="menu"
        (click)="onFooterTriggerClick($event)"
        (keydown)="onFooterTriggerKeydown($event)"
      >
        <span class="stagyra-magnetic-menu__footer-trigger-icon" aria-hidden="true">
          <span *ngIf="menu.iconClass" [class]="menu.iconClass">
            {{ menu.icon || '' }}
          </span>
          <span *ngIf="!menu.iconClass && menu.icon" class="material-symbols-rounded">
            {{ menu.icon }}
          </span>
        </span>
        <span class="stagyra-magnetic-menu__footer-trigger-label">{{ menu.label }}</span>
      </button>
    </div>
  </aside>

  <main class="stagyra-magnetic-menu__content">
    <ng-content></ng-content>
  </main>
</div>
